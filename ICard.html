<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: gray;
}

.card{
    width: 400px;
    height: 620px;
    background: white;
    border-radius: 25px;
    padding: 20px;
    box-shadow: 0 15px 25px rgba(0,0,0,0.4);
    border: 4px solid #00ccff;
}

.hed-img{
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
}

.clg-name{
    text-align: center;
}

.clg-name h3{
    color: purple;
    margin-bottom: 8px;
}

.clg-name h1{
    font-size: 20px;
    margin-bottom: 6px;
}

.id-pic-name{
    text-align: center;
    margin-top: 25px;
}

.id-pic-name img{
    width: 110px;
    height: 110px;
    border-radius: 50%;
    border: 3px solid cyan;
    margin-top: 10px;
    margin-bottom: 10px;
}

.id-pic-name label{
    display: block;
    margin-top: 5px;
    font-size: 18px;
    font-weight: bold;
}

.details{
    margin-top: 30px;
    padding: 15px;
    background: rgb(240,240,240);
    border-radius: 15px;
}

.details label{
    display: inline-block;
    width: 45%;
    margin-bottom: 15px;
}

.title{
    font-weight: bold;
    color: purple;
}

    </style>
</head>
<body>
    <div class="card">
        <div class="hed-img">
            <img src="jspm1.png" width="90px">
            <img src="jspm2.png" width="90px">
        </div>
        <div class="clg-name">
            <h3>JSPM's</h3>
            <h1>Rajashri Shahu</h1>
            <h1>College of Engineering Ploytechnic</h1>
        </div>

        <div class="id-pic-name">
            <label>Student ID</label>
            <img src="student.png" width="50px">
            <label>Mayur Kudale</label>
        </div>

        <div class="details">
            <label class="title">Course</label>
            <label>: Polytechnic</label>
            <label class="title">Branch</label>
            <label>: Computer</label>
            <label class="title">Enrollment No.</label>
            <label>: 12345678901</label>
            <label class="title">Mobile No.</label>
            <label>: 1234567890</label>
        </div>
    </div>
</body>
</html>
