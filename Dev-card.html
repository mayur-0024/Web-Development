<!DOCTYPE html>
<html>
<head>
    <title>Developer Card</title>

    <style>
        *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial;
}

body{
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #e6e6e6;
}

.card{
    width: 350px;
    background: white;
    padding: 30px;
    text-align: center;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.card img{
    border-radius: 50%;
    border: 3px solid black;
    margin-bottom: 15px;
}

.card img:hover{
    transform: scale(1.1);
    transition: 0.2s;
}

.card h1{
    margin-bottom: 8px;
}

.card h3{
    color: gray;
    margin-bottom: 15px;
}

.card p{
    margin-bottom: 15px;
}

.skills{
    margin-bottom: 20px;
}

.skills span{
    display: inline-block;
    background: black;
    color: white;
    padding: 8px 14px;
    margin: 5px;
    border-radius: 15px;
}

.info{
    margin-bottom: 20px;
}

button{
    padding: 12px 25px;
    border: none;
    background: black;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

button:hover{
    transform: scale(1.1);
    transition: 0.2s;
}
    </style>
</head>
<body>

    <div class="card">
        <img src="student.png" width="120px">

        <h1>Mayur Kudale</h1>
        <h3>Wed Developer</h3>

        <p>
            Passionate web developer learning HTML, CSS and JavaScript.
        </p>

        <div class="skills">
            <span>HTML</span>
            <span>CSS</span>
            <span>JavaScript</span>
        </div>

        <div class="info">
            <p>Email: ABCDmail@gmail.com</p>
            <p>Phone: 1234567890</p>
        </div>

        <button>Hire Me</button>
    </div>

</body>
</html>
