<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="forms.css">
</head>
<body>
    <center>
        <h1>Learning Html</h1>
    </center>

    <form action="welcome.html" method="get">
        Name: <input type="text" placeholder="Enter your name">
        <br><br>
        Password: <input type="password" placeholder="Enter your password">
        <br><br>
        Email: <input type="email" placeholder="Enter your email">
        <br><br>
        Number: <input type="number" placeholder="Enter your number">
        <br><br>
        Date: <input type="date">
        <br><br>
        Time: <input type="time">
        <br><br><hr>
        Select Gender: <br>
        <input type="radio" name="gender">Male <br>
        <input type="radio" name="gender">Female
        <br><br><hr>
        <fieldset>
            <legend>Fieldset Tag: </legend>
            <center>
                Enter Name: <input type="name" placeholder="Enter Name">
            </center>
        </fieldset>
        <br><hr>
        Subject ChechBox: <br>
        <input type="checkbox">Python <br>
        <input type="checkbox">java <br>
        <input type="checkbox">c <br>
        <input type="checkbox">c++
        <br><br><hr>
        TextArea Feedback: <br>
        <textarea placeholder="Give Feedback" rows="5" cols=""></textarea>
        <br><br><hr>
        Subjects: <select name="" id="">
            <option value="">java</option>
            <option value="">python</option>
            <option value="">html</option>
            <option value="">css</option>
        </select>
        <br><br><hr>
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Class</th>
                <th>Course</th>
            </tr>

            <tr>
                <td>Mayur</td>
                <td>3rd yr</td>
                <td>Web-Dev</td>
            </tr>
        </table>
        <br><br><hr>
        Button: <button>Submit</button><br><br>
        Button: <input type="submit">
    </form>
</body>
</html>
