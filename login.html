<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form | Mayur</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="container">
        <div class="form-container">
                <div class="form-blob">
                    <img src="blob.png" alt="blob" class="blob-image image-1">
                    <img src="blob.png" alt="blob" class="blob-image image-2">
                    <img src="blob.png" alt="blob" class="blob-image image-3">
                </div>
            <div class="form-header">
                <p>Please Enter Your Details</p>
                <h1>Welcome Back</h1>
            </div>
            <form class="form-box">
                <div class="input-group">
                    <input type="email" id="email" class="input-field" placeholder="Enter Your Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" class="input-field" placeholder="Enter Your Password" required>
                    <div class="eye-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-icon lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                    </div>
                </div>
                <div class="checkbox-group">
                    <div class="remember-me">
                        <input type="checkbox" id="remember-me-checkbox" class="checkbox-field">
                        <label for="remember-me-checkbox">Remember me</label>
                    </div>
                    <div class="form-col">
                        <a href="#" class="form-link">Forgot Password</a>
                    </div>
                </div>
                <button type="submit" class="button-submit">Sign In</button>
            </form>
            <div class="form-divider">
                <p>Or</p>
            </div>
            <div class="form-bottom">
                <div class="form-socials">
                    <button class="form-btn-socials">
                        <img src="google.png" alt="social icon" class="btn-icon">
                    </button>
                    <button class="form-btn-socials">
                        <img src="facebook.png" alt="social icon" class="btn-icon">
                    </button>
                    <button class="form-btn-socials">
                        <img src="apple.png" alt="social icon" class="btn-icon">
                    </button>
                </div>
                <p>Dont't have an accounts? <a href="#" class="form-link">Sign up</a></p>
            </div>
        </div>
    </div>
</body>
</html>
